<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mikuOS</title>

    <link rel="stylesheet" href="css/desktop.css">
     <script src="js/script.js" defer></script>

     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="topbar">
        <div class="time" id="time"></div>
        <!-- <div class="buttons">
            <button>b</button>
            <button>w</button>
            <button>p</button>
        </div> -->
    </div>

    <div class="window" id="settings-window">
        <div class="window-titlebar">
            <span>Settings</span>

            <div class="window-controls">
                <button id="settings-close">✕</button>
            </div>
        </div>

        <div class="window-content">
            Select a theme: <select><option>Miku (Default)</option></select>
        </div>
    </div>

        <div class="window" id="welcome-window">
        <div class="window-titlebar">
            <span>Welcome</span>

            <div class="window-controls">
                <button id="welcome-close">✕</button>
            </div>
        </div>
        <div class="window-content">
            <h1>Welcome to mikuOS!</h1>

            <p>
                A tiny web-based desktop experience powered by
                <strong>HTML</strong>, <strong>CSS</strong>, and <strong>JavaScript</strong>.
            </p>

            <p>
                Explore the desktop, open apps, change themes,
                and make this little world your own! ✧
            </p>
        </div>
    </div>

    <div class="desktop">
        <!-- <button class="desktop-icon">
            <img src="assets/icons/settings.png"></img>
            <span>Settings</span>
        </button> -->
    </div>

    <div class="dock">
        <button class="dock-icon">
            <img src="assets/icons/finder.png">
        </button>

        <button class="dock-icon" id="settings-button">
            <img src="assets/icons/settings.png">
        </button>
    </div>
</body>
</html>
